name: Schema Health Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  schema-health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run schema health check
        id: check
        env:
          GATEWAY_URL: ${{ vars.GATEWAY_URL }}
        run: |
          node scripts/schema-health-check.mjs --json --base-ref origin/${{ github.base_ref }} > report.json 2> summary.txt
          echo "exit_code=0" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Format PR comment
        id: comment
        if: always()
        run: |
          {
            echo 'body<<COMMENT_EOF'

            if [ ! -f report.json ] || [ ! -s report.json ]; then
              echo "## Schema Health Check"
              echo ""
              echo "Failed to generate report. Check workflow logs."
              echo ""
              cat summary.txt 2>/dev/null || true
              echo 'COMMENT_EOF'
            else
              TOTAL=$(jq -r '.summary.total' report.json)
              CONSISTENT=$(jq -r '.summary.fullyConsistent' report.json)
              MISSING_FILE=$(jq -r '.summary.missingSchemaFile' report.json)
              MISSING_GW=$(jq -r '.summary.missingGateway' report.json)
              GW_ERRORS=$(jq -r '.summary.gatewayErrors' report.json)
              META_DRIFT=$(jq -r '.summary.metadataDrift' report.json)
              ORPHANS=$(jq -r '.summary.orphanedSchemas' report.json)

              ISSUES=$((MISSING_FILE + MISSING_GW + GW_ERRORS + META_DRIFT + ORPHANS))

              if [ "$ISSUES" = "0" ]; then
                echo "## Schema Health Check — All Clear"
                echo ""
                echo "All $TOTAL scopes are fully consistent (local schema files + Gateway registration)."
              else
                echo "## Schema Health Check — $ISSUES issue(s) found"
                echo ""
                echo "$CONSISTENT/$TOTAL scopes consistent | $MISSING_FILE missing schema files | $MISSING_GW not in Gateway | $META_DRIFT metadata drift | $ORPHANS orphaned"
                echo ""
                echo "<details>"
                echo "<summary>View issues</summary>"
                echo ""

                if [ "$MISSING_FILE" != "0" ]; then
                  echo "**Missing local schema files:**"
                  echo ""
                  echo "| Scope | Connector | Added in PR? |"
                  echo "|-------|-----------|--------------|"
                  jq -r '.scopes[] | select(.schemaFileExists == false) | "| \(.scope) | \(.connector) | \(if .isNew then "added in this PR" else "" end) |"' report.json
                  echo ""
                fi

                if [ "$MISSING_GW" != "0" ]; then
                  echo "**Not registered in Gateway:**"
                  echo ""
                  echo "| Scope | Connector | Added in PR? |"
                  echo "|-------|-----------|--------------|"
                  jq -r '.scopes[] | select(.gatewayStatus == "missing") | "| \(.scope) | \(.connector) | \(if .isNew then "added in this PR" else "" end) |"' report.json
                  echo ""
                fi

                if [ "$META_DRIFT" != "0" ]; then
                  echo "**Metadata mismatch (local vs Gateway):**"
                  echo ""
                  echo "| Scope | Connector | Mismatches |"
                  echo "|-------|-----------|------------|"
                  jq -r '.scopes[] | select(.metadataMismatches != null and (.metadataMismatches | length) > 0) | "| \(.scope) | \(.connector) | \(.metadataMismatches | join("; ")) |"' report.json
                  echo ""
                fi

                if [ "$GW_ERRORS" != "0" ]; then
                  echo "**Gateway errors:**"
                  echo ""
                  echo "| Scope | Connector | Error |"
                  echo "|-------|-----------|-------|"
                  jq -r '.scopes[] | select(.gatewayStatus == "error") | "| \(.scope) | \(.connector) | \(.gatewayError // "-") |"' report.json
                  echo ""
                fi

                if [ "$ORPHANS" != "0" ]; then
                  echo "**Orphaned schema files** (no connector declares this scope):"
                  echo ""
                  jq -r '.orphanedSchemas[] | "- `schemas/" + . + ".json`"' report.json
                  echo ""
                fi

                echo "</details>"
                echo ""
                echo "> These issues should be resolved before connectors can be used by Personal Servers."
              fi

              echo 'COMMENT_EOF'
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: schema-health-check
          message: ${{ steps.comment.outputs.body }}

      - name: Fail if issues found
        if: steps.check.outcome == 'failure'
        run: |
          cat summary.txt
          exit 1
