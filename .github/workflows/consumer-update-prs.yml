name: Consumer Update PRs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "connector-index.json"
      - "artifacts/**"
      - "packages/connector-installer-core/**"
      - "package.json"

permissions:
  contents: read

jobs:
  update-context-gateway:
    if: ${{ secrets.CONSUMER_PR_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: data-connectors

      - uses: actions/checkout@v4
        with:
          repository: vana-com/context-gateway
          token: ${{ secrets.CONSUMER_PR_TOKEN }}
          ref: staging
          path: context-gateway

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install context-gateway deps
        working-directory: context-gateway
        run: npm install

      - name: Install local shared installer package
        working-directory: context-gateway
        run: npm install --no-save ../data-connectors

      - name: Resolve connectors and regenerate catalog
        working-directory: context-gateway
        run: |
          node scripts/resolve-connectors.mjs --from-local ../data-connectors
          node scripts/generate-connector-catalog.mjs
          node scripts/validate-connector-overlay.mjs

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.CONSUMER_PR_TOKEN }}
          path: context-gateway
          branch: automation/update-data-connectors
          delete-branch: true
          commit-message: "chore: refresh connector snapshot"
          title: "chore: refresh connector snapshot"
          body: |
            Automated update from `vana-com/data-connectors`.

            Changes:
            - refreshed `config/data-connectors-snapshot/`
            - refreshed generated connector catalog

  update-data-connect:
    if: ${{ secrets.CONSUMER_PR_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: data-connectors

      - uses: actions/checkout@v4
        with:
          repository: vana-com/data-connect
          token: ${{ secrets.CONSUMER_PR_TOKEN }}
          ref: main
          path: data-connect

      - name: Check for required consumer scripts
        id: scripts_check
        working-directory: data-connect
        run: |
          if [ -f scripts/resolve-connectors.js ] && [ -f scripts/generate-platform-registry.js ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping update-data-connect: consumer scripts not yet on data-connect main. Remove this guard after data-connect PR #106 merges."
          fi

      - uses: actions/setup-node@v4
        if: steps.scripts_check.outputs.present == 'true'
        with:
          node-version: "20"

      - name: Install data-connect deps
        if: steps.scripts_check.outputs.present == 'true'
        working-directory: data-connect
        run: npm install

      - name: Install local shared installer package
        if: steps.scripts_check.outputs.present == 'true'
        working-directory: data-connect
        run: npm install --no-save ../data-connectors

      - name: Resolve connectors and regenerate platform registry
        if: steps.scripts_check.outputs.present == 'true'
        working-directory: data-connect
        run: |
          node scripts/resolve-connectors.js --from-local ../data-connectors
          node scripts/generate-platform-registry.js

      - name: Run tests
        if: steps.scripts_check.outputs.present == 'true'
        working-directory: data-connect
        run: npm test

      - name: Create pull request
        if: steps.scripts_check.outputs.present == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.CONSUMER_PR_TOKEN }}
          path: data-connect
          branch: automation/update-data-connectors
          delete-branch: true
          commit-message: "chore: refresh bundled connectors"
          title: "chore: refresh bundled connectors"
          body: |
            Automated update from `vana-com/data-connectors`.

            Changes:
            - refreshed bundled connectors under `connectors/`
            - refreshed generated platform registry
